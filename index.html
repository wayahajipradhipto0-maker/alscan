cat > ~/alscan.html << 'EOF'
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL SCAN GEMINI</title>
<script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
<style>
body{font-family:sans-serif;background:#020617;color:#e2e8f0;margin:0;padding:10px}
h1{color:#38bdf8;text-align:center;margin:10px 0}
.container{max-width:500px;margin:auto}
.btn{background:#38bdf8;color:#020617;border:0;padding:14px;font-size:16px;border-radius:12px;font-weight:700;width:100%;margin:8px 0}
.vidbox{position:relative;border-radius:16px;overflow:hidden;border:3px solid #38bdf8}
video{width:100%;display:block}
.guide{position:absolute;border:2px dashed #fbbf24;top:10%;left:5%;width:90%;height:80%;pointer-events:none;border-radius:8px}
.card{background:#0f172a;padding:16px;border-radius:16px;margin-top:12px;border:1px solid #1e293b}
#loading{display:none;text-align:center;color:#fbbf24;padding:20px}
#soal,#jawaban{white-space:pre-wrap;line-height:1.6}
.tag{font-size:12px;color:#64748b;margin-bottom:4px}
</style>
</head>
<body>
<div class="container">
  <h1>📚 AL SCAN GEMINI AI</h1>
  <button class="btn" onclick="startCam()">📷 NYALAIN KAMERA</button>
  <div class="vidbox">
    <video id="video" autoplay playsinline></video>
    <div class="guide"></div>
  </div>
  <button class="btn" onclick="capture()">📸 SCAN + JAWAB BENERAN</button>

  <div id="loading">⏳ Scan 10 detik + Mikir 10 detik...</div>

  <div class="card">
    <div class="tag">HASIL SCAN SOAL</div>
    <div id="soal">-</div>
  </div>

  <div class="card">
    <div class="tag">JAWABAN GEMINI AI</div>
    <div id="jawaban">-</div>
    <button class="btn" style="background:#1e293b;color:#38bdf8;margin-top:12px" onclick="copyJawaban()">📋 COPY JAWABAN</button>
  </div>
</div>

<canvas id="canvas" style="display:none"></canvas>

<script>
let stream;
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');

// GANTI PAKE API KEY GRATIS LU SENDIRI DARI: https://aistudio.google.com/app/apikey
const GEMINI_KEY = 'AIzaSyBdzG0_lR8FXOB7k4NjKjNc8gS5qFzYx1A';

async function startCam(){
  try{
    stream = await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1920},height:{ideal:1080}}
    });
    video.srcObject = stream;
  }catch(e){alert('Error: '+e.message)}
}

function bersihinTeks(teks){
  return teks
   .replace(/[^\w\s\d\.\,\+\-\=\:\(\)\/\?\³\²]/g, '')
   .replace(/®/g, '³')
   .replace(/\s+/g, ' ')
   .replace(/d4|a aa|Py pp|Nw/gi, '')
   .replace(/disebut i/g, 'disebut')
   .trim();
}

async function tanyaGemini(soal){
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_KEY}`;
  const body = {
    contents: [{
      parts: [{text: `Kamu adalah guru matematika SMP. Jawab soal ini singkat, jelas, langsung ke intinya dalam Bahasa Indonesia. Jika pilihan ganda, sebut huruf jawabannya. Soal: ${soal}`}]
    }]
  };
  const res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

async function capture(){
  if(!video.srcObject) return alert('Nyalain kamera dulu');
  const loading = document.getElementById('loading');
  const soalEl = document.getElementById('soal');
  const jawabEl = document.getElementById('jawaban');
  
  loading.style.display = 'block';
  soalEl.innerText = jawabEl.innerText = 'Proses...';

  // 1. OCR
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  
  const { data: { text } } = await Tesseract.recognize(canvas, 'ind+eng');
  const soalBersih = bersihinTeks(text);
  soalEl.innerText = soalBersih || 'Ga kebaca';
  
  // 2. TANYA GEMINI AI BENERAN
  if(soalBersih.length > 5){
    try{
      const jawaban = await tanyaGemini(soalBersih);
      jawabEl.innerText = jawaban;
    }catch(e){
      jawabEl.innerText = 'Error AI: '+e.message+'\n\nPastiin API Key Gemini udah bener.';
    }
  } else {
    jawabEl.innerText = 'Soal ga kebaca, ga bisa jawab';
  }
  loading.style.display = 'none';
}

function copyJawaban(){
  navigator.clipboard.writeText(document.getElementById('jawaban').innerText);
  alert('Udah ke-copy!');
}
</script>
</body>
</html>
EOF
